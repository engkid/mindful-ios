name: Mindful
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  MindfulModules:
    path: Packages/MindfulModules
targets:
  Mindful:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: App
        excludes:
          - Resources/GoogleService-Info.plist
          - Resources/GoogleService-Info.plist.example
    dependencies:
      - package: MindfulModules
        product: CoreFirebase
      - package: MindfulModules
        product: CoreNetworking
      - package: MindfulModules
        product: CoreStorage
      - package: MindfulModules
        product: CoreLogger
      - package: MindfulModules
        product: HomeFeature
      - package: MindfulModules
        product: SampleFeature
      - package: MindfulModules
        product: ReflectionFeature
    postCompileScripts:
      - name: Copy Firebase Config
        basedOnDependencyAnalysis: false
        showEnvVars: false
        script: |
          FIREBASE_CONFIG="${SRCROOT}/App/Resources/GoogleService-Info.plist"
          FIREBASE_CONFIG_DESTINATION="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/GoogleService-Info.plist"
          if [ -f "$FIREBASE_CONFIG" ]; then
            mkdir -p "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
            cp "$FIREBASE_CONFIG" "$FIREBASE_CONFIG_DESTINATION"
          fi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.mindful
        PRODUCT_NAME: Mindful
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        CODE_SIGN_STYLE: Automatic
schemes:
  Mindful:
    build:
      targets:
        Mindful: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets: []
